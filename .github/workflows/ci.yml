name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,languages]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        run: pytest --tb=short

  self-analysis:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,languages]"

      # Download the most recent baseline produced by a self-analysis run.
      # On pull requests we look on the base branch; on push events we look
      # on the current branch (compare against the previous push).
      # The step is allowed to fail (no baseline on first run).
      - name: Find latest successful self-analysis run for baseline
        id: find-run
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.eventName === 'pull_request'
              ? context.payload.pull_request.base.ref
              : context.ref.replace('refs/heads/', '');

            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch,
              status: 'success',
              per_page: 10,
            });

            for (const run of data.workflow_runs) {
              const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
              });
              const found = artifacts.artifacts.find(
                a => a.name === 'arcade-agent-analysis-baseline'
              );
              if (found) {
                core.setOutput('run_id', String(run.id));
                return;
              }
            }
            core.setOutput('run_id', '');

      - name: Download baseline (previous analysis)
        id: download-baseline
        if: steps.find-run.outputs.run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: arcade-agent-analysis-baseline
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.find-run.outputs.run_id }}
        continue-on-error: true

      # Locate the downloaded baseline JSON, if any.
      - name: Locate baseline file
        id: baseline
        run: |
          if [ -f analysis_baseline.json ]; then
            echo "path=analysis_baseline.json" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run self-analysis
        run: |
          BASELINE_ARG=""
          if [ "${{ steps.baseline.outputs.found }}" = "true" ]; then
            BASELINE_ARG="--baseline ${{ steps.baseline.outputs.path }}"
          fi
          python scripts/self_analysis.py \
            --source . \
            --output analysis_baseline.json \
            $BASELINE_ARG \
            --comment-output pr_comment.md

      - name: Upload analysis baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcade-agent-analysis-baseline
          path: analysis_baseline.json
          overwrite: true

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: arcade-agent-analysis-report
          path: |
            analysis_baseline.json
            pr_comment.md

      # Post or update a PR comment with the analysis summary.
      # Only runs on pull_request events.
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentPath = 'pr_comment.md';
            if (!fs.existsSync(commentPath)) {
              console.log('No PR comment file found, skipping.');
              return;
            }
            const body = fs.readFileSync(commentPath, 'utf8');
            const marker = '<!-- arcade-agent-self-analysis -->';
            const fullBody = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
              console.log('Updated existing PR comment.');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
              console.log('Created new PR comment.');
            }
