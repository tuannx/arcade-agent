name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,languages]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        run: pytest --tb=short

  analysis:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,languages]"

      - name: Self-analysis
        run: python examples/basic_analysis.py . --language python --output arcade_agent_report.html

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: arcade-agent-self-analysis
          path: arcade_agent_report.html
