name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,languages]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        run: pytest --tb=short

  # ── Self-dogfooding: arcade-agent analyses its own codebase ────────────────
  analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # needed to post PR comments

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,languages]"

      # ── 1. Run primary self-analysis (stable CI trend) ────────────────────
      - name: Run primary self-analysis
        run: |
          python scripts/run_self_analysis.py \
            --algorithm pkg \
            --output-json arcade_analysis_results.json \
            --output-html arcade_analysis_report.html

      # ── 1b. Run secondary/exploratory analyses for reference ──────────────
      - name: Run secondary architecture analyses
        run: |
          python scripts/run_self_analysis.py \
            --algorithm acdc \
            --output-json arcade_analysis_acdc.json \
            --output-html arcade_analysis_acdc.html
          python scripts/run_self_analysis.py \
            --algorithm wca \
            --num-clusters 4 \
            --output-json arcade_analysis_wca.json \
            --output-html arcade_analysis_wca.html

      # ── 2. Display results inline in Actions logs ──────────────────────────
      - name: Display primary analysis results
        run: python scripts/log_analysis_summary.py arcade_analysis_results.json

      - name: Display secondary analysis results
        run: |
          echo "== ACDC =="
          python scripts/log_analysis_summary.py arcade_analysis_acdc.json
          echo "== WCA (exploratory) =="
          python scripts/log_analysis_summary.py arcade_analysis_wca.json

      # ── 3. Download baseline from last successful main-branch run ──────────
      - name: Download baseline (if available)
        id: download_baseline
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Find the most recent successful workflow run on main that has a baseline artifact
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: 'main',
              status: 'success',
              per_page: 10,
            });

            for (const run of runs.data.workflow_runs) {
              const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
              });

              const baseline = artifacts.data.artifacts.find(
                a => a.name === 'arcade-agent-baseline'
              );
              if (!baseline) continue;

              // Download baseline artifact
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: baseline.id,
                archive_format: 'zip',
              });

              fs.writeFileSync('baseline.zip', Buffer.from(download.data));
              core.setOutput('found', 'true');
              console.log(`Downloaded baseline from run ${run.id} (${run.created_at})`);
              return;
            }

            core.setOutput('found', 'false');
            console.log('No baseline artifact found — first run or baseline expired.');

      - name: Unpack baseline
        if: steps.download_baseline.outputs.found == 'true'
        run: |
          mkdir -p baseline_dir
          unzip -q baseline.zip -d baseline_dir
          echo "Baseline contents:"
          ls baseline_dir/

      # ── 4. Compare current vs baseline + generate PR comment body ──────────
      - name: Compare with baseline and generate comment
        run: |
          BASELINE_ARG=""
          CURRENT_ALGORITHM=$(python -c "import json; from pathlib import Path; print(json.loads(Path('arcade_analysis_results.json').read_text()).get('algorithm', ''))")
          if [ -f baseline_dir/arcade_analysis_baseline.json ]; then
            BASELINE_ALGORITHM=$(python -c "import json; from pathlib import Path; print(json.loads(Path('baseline_dir/arcade_analysis_baseline.json').read_text()).get('algorithm', ''))")
            if [ "$BASELINE_ALGORITHM" = "$CURRENT_ALGORITHM" ]; then
              BASELINE_ARG="baseline_dir/arcade_analysis_baseline.json"
            else
              echo "Skipping baseline comparison: baseline algorithm '$BASELINE_ALGORITHM' differs from current '$CURRENT_ALGORITHM'."
            fi
          fi
          python scripts/compare_baseline.py \
            arcade_analysis_results.json \
            $BASELINE_ARG \
            --output pr_comment.md \
            --output-html arcade_analysis_comparison.html \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      # ── 5. Upload HTML report + JSON as CI artifact ────────────────────────
      - name: Upload analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcade-agent-self-analysis
          path: |
            arcade_analysis_report.html
            arcade_analysis_acdc.html
            arcade_analysis_wca.html
            arcade_analysis_comparison.html
            arcade_analysis_results.json
            arcade_analysis_acdc.json
            arcade_analysis_wca.json
            pr_comment.md
          retention-days: 30

      # ── 6. Store baseline artifact (only on main-branch pushes) ───────────
      - name: Store baseline artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: cp arcade_analysis_results.json arcade_analysis_baseline.json

      - name: Upload baseline artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: arcade-agent-baseline
          path: arcade_analysis_baseline.json
          retention-days: 90

      # ── 7. Auto-comment PR with analysis summary ───────────────────────────
      - name: Post analysis comment to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentBody = fs.readFileSync('pr_comment.md', 'utf8');
            const marker = '<!-- arcade-agent-analysis -->';
            const body = `${marker}\n${commentBody}`;

            // Find and update existing bot comment, or create a new one
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log('Updated existing analysis comment.');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new analysis comment.');
            }
